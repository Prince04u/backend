version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/luckynova
      - REDIS_URL=redis://cache:6379
      - JWT_SECRET=luckynova-super-secret-jwt-key-2026
      - NODE_ENV=production
    depends_on:
      - db
      - cache

  db:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo-data:
